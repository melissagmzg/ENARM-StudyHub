<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temario Neonatología</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 20px; }
        .header { background: #00897b; color: white; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; position: relative; }
        .btn-back { position: absolute; left: 20px; top: 25px; color: white; text-decoration: none; font-weight: bold; }
        .grid-temas { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1100px; margin: auto; }
        .tema-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s; cursor: pointer; border-left: 5px solid #00897b; }
        .tema-card:hover { transform: scale(1.02); background: #e0f2f1; }
        .tema-card h3 { margin: 0; font-size: 1.1em; color: #333; }
        .etiqueta { font-size: 0.75em; color: #00897b; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <a href="pediatria.html" class="btn-back">← Volver</a>
        <h1>Neonatología</h1>
        <p>Selecciona un tema para desglosar recursos</p>
    </div>

    <div class="grid-temas">
        <div class="tema-card" onclick="location.href='tema-rn-sano.html'">
            <div class="etiqueta">Tema 01</div>
            <h3>Recién Nacido Sano</h3>
        </div>

        <div class="tema-card" onclick="location.href='tema-reanimacion.html'">
            <div class="etiqueta">Tema 02</div>
            <h3>Reanimación Neonatal</h3>
        </div>

        <div class="tema-card" onclick="location.href='tema-resp-neonatal.html'">
            <div class="etiqueta">Tema 03</div>
            <h3>Patología Respiratoria</h3>
        </div>

        <div class="tema-card" onclick="location.href='tema-ictericia.html'">
            <div class="etiqueta">Tema 04</div>
            <h3>Ictericia Neonatal</h3>
        </div>
        
        </div>

</body>
</html>
